<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="color-scheme" content="dark light">
  <meta name="description" content="WOMBIT Empire - The cutest viral crypto sensation on Solana. Tap, earn, conquer! Join millions of players!">
  <title>WOMBIT Empire | Viral Crypto Mini App</title>
  
  <!-- Preconnect for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://telegram.org">
  
  <!-- Google Fonts - Premium Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  
  <!-- Telegram WebApp SDK v8.0+ -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- GSAP for Premium Animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  
  <!-- Three.js for 3D Effects -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       WOMBIT EMPIRE v4.0 - VIRAL PREMIUM EDITION
       Complete Telegram SDK v8.0+ | Production Ready | App Store Quality
    ═══════════════════════════════════════════════════════════════════════ */

    :root {
      /* Viral Crypto Color Palette */
      --primary: #ffd700;
      --primary-dark: #ffb800;
      --primary-glow: rgba(255, 215, 0, 0.4);
      --secondary: #00d4ff;
      --secondary-glow: rgba(0, 212, 255, 0.3);
      --accent: #ff6b9d;
      --accent-glow: rgba(255, 107, 157, 0.3);
      --success: #00ff88;
      --warning: #ffb800;
      
      /* Backgrounds */
      --bg-0: #0a0a1a;
      --bg-1: #121225;
      --bg-2: #1a1a35;
      --bg-3: #252550;
      --surface: rgba(26, 26, 53, 0.9);
      --surface-elevated: rgba(37, 37, 80, 0.95);
      
      /* Legacy Colors (Backward Compatible) */
      --gold: var(--primary);
      --gold-dark: var(--primary-dark);
      --green: var(--success);
      --green-dark: #00cc6a;
      --purple: #8b5cf6;
      
      /* Effects */
      --border-subtle: rgba(255, 255, 255, 0.08);
      --border-gold: rgba(255, 215, 0, 0.3);
      --border-gold-strong: rgba(255, 215, 0, 0.5);
      --glow-gold: 0 0 40px var(--primary-glow);
      --glow-cyan: 0 0 40px var(--secondary-glow);
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.4);
      
      /* Typography */
      --font-display: 'Outfit', 'Syne', sans-serif;
      --font-body: 'Inter', 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', 'Space Mono', monospace;
      
      /* Spacing Scale */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      
      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-2xl: 32px;
      --radius-full: 9999px;
      
      /* Transitions */
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-bounce: 600ms cubic-bezier(0.68, -0.55, 0.265, 1.55);
      
      /* Safe Areas */
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);
      --content-safe-top: env(safe-area-inset-top);
      
      /* 3D Tilt */
      --tilt-x: 0deg;
      --tilt-y: 0deg;
    }

    /* ── RESET & BASE ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-0);
      color: #ffffff;
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── DYNAMIC BACKGROUND ── */
    .bg-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 50% 100%, rgba(255, 215, 0, 0.08) 0%, transparent 40%);
      animation: bgPulse 15s ease-in-out infinite;
    }

    @keyframes bgPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 70%);
    }

    /* ── 3D CANVAS ── */
    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.5;
    }

    /* ── LOADING SCREEN ── */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s, visibility 0.5s;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      animation: loadingPulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 60px var(--primary-glow);
      border: 3px solid rgba(255, 215, 0, 0.3);
    }

    @keyframes loadingPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .loading-text {
      margin-top: var(--space-lg);
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.2em;
    }

    .loading-bar {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-full);
      margin-top: var(--space-md);
      overflow: hidden;
    }

    .loading-progress {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: var(--radius-full);
      animation: loadingProgress 2s ease-out infinite;
    }

    @keyframes loadingProgress {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    /* ── ERROR BOUNDARY ── */
    .error-fallback {
      position: fixed;
      inset: 0;
      background: var(--bg-0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
      text-align: center;
      z-index: 99999;
    }

    .error-fallback h2 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: #ef4444;
      margin-bottom: var(--space-md);
    }

    .error-fallback button {
      background: var(--primary);
      color: #000;
      border: none;
      padding: var(--space-md) var(--space-xl);
      border-radius: var(--radius-lg);
      font-family: var(--font-display);
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition-fast);
    }

    .error-fallback button:active {
      transform: scale(0.95);
    }

    /* ── APP CONTAINER ── */
    .app-container {
      position: relative;
      z-index: 2;
      max-width: 560px;
      margin: 0 auto;
      padding: var(--space-md) var(--space-md) calc(var(--space-2xl) + var(--safe-bottom));
      min-height: 100vh;
      padding-top: max(var(--space-md), var(--content-safe-top));
    }

    /* ── USER BAR (Enhanced) ── */
    .user-bar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      background: var(--surface);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-xl);
      padding: var(--space-sm) var(--space-md);
      margin-bottom: var(--space-lg);
      backdrop-filter: blur(20px) saturate(180%);
      position: relative;
      overflow: hidden;
      transition: all var(--transition-base);
    }

    .user-bar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.05), transparent);
      animation: shimmer 3s infinite;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
      flex-shrink: 0;
      font-family: var(--font-display);
      position: relative;
      z-index: 1;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .user-info {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .user-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--font-display);
    }

    .user-status {
      font-size: 0.75rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .user-status::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .user-badge {
      margin-left: auto;
      font-size: 0.75rem;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1));
      color: var(--primary);
      border: 1px solid var(--border-gold-strong);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
      animation: badgeGlow 2s ease-in-out infinite;
      font-family: var(--font-display);
    }

    @keyframes badgeGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
      50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.5); }
    }

    /* ── HERO SECTION (Viral Style) ── */
    .hero {
      text-align: center;
      margin-bottom: var(--space-xl);
      position: relative;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: var(--space-md);
      backdrop-filter: blur(10px);
      animation: tagPulse 2s infinite;
    }

    @keyframes tagPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(0, 212, 255, 0); }
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, var(--primary) 50%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--space-sm);
      position: relative;
      text-transform: uppercase;
    }

    .hero-title::after {
      content: 'WOMBIT';
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.4) 50%, transparent 60%);
      -webkit-background-clip: text;
      background-size: 200% 100%;
      animation: shine 3s infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .hero-subtitle {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      max-width: 360px;
      margin: 0 auto var(--space-lg);
      line-height: 1.6;
    }

    /* ── STATS BAR (New Viral Feature) ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: var(--space-md) var(--space-sm);
      text-align: center;
      transition: all var(--transition-base);
      position: relative;
      overflow: hidden;
    }

    .stat-box:hover {
      transform: translateY(-4px);
      border-color: var(--border-gold);
      box-shadow: var(--glow-gold);
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 4px;
      text-shadow: 0 0 20px var(--primary-glow);
    }

    .stat-label {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }

    /* ── ENERGY BAR (Gamification) ── */
    .energy-section {
      margin-bottom: var(--space-lg);
    }

    .energy-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-sm);
      font-size: 0.85rem;
    }

    .energy-label {
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .energy-value {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--primary);
    }

    .energy-track {
      height: 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-full);
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .energy-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: var(--radius-full);
      transition: width 0.3s ease;
      box-shadow: 0 0 20px var(--primary-glow);
      position: relative;
    }

    .energy-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: shimmer 2s infinite;
    }

    /* ── TAP ZONE (Premium 3D) ── */
    .tap-zone {
      text-align: center;
      margin-bottom: var(--space-xl);
      position: relative;
      perspective: 1000px;
    }

    .wombat-wrapper {
      position: relative;
      display: inline-block;
      transform-style: preserve-3d;
      transform: rotateX(var(--tilt-y)) rotateY(var(--tilt-x));
      transition: transform 0.1s ease-out;
    }

    .wombat-glow {
      position: absolute;
      inset: -30px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      opacity: 0.6;
      animation: glowPulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    .wombat-orbit {
      position: absolute;
      inset: -50px;
      border: 2px dashed rgba(255, 215, 0, 0.15);
      border-radius: 50%;
      animation: orbit 25s linear infinite;
      pointer-events: none;
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .wombat-tap {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      user-select: none;
      transition: transform var(--transition-bounce);
      z-index: 10;
    }

    .wombat-tap:active {
      transform: scale(0.95);
    }

    .wombat-tap.tapped {
      animation: tapBounce 0.5s var(--transition-bounce);
    }

    @keyframes tapBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.15) translateY(-15px); }
      100% { transform: scale(1); }
    }

    .wombat-image {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 215, 0, 0.4);
      box-shadow: 
        0 0 60px var(--primary-glow),
        0 20px 40px rgba(0, 0, 0, 0.5);
      transition: all var(--transition-base);
    }

    .wombat-tap:hover .wombat-image {
      box-shadow: 
        0 0 80px var(--primary-glow),
        0 30px 60px rgba(0, 0, 0, 0.4);
    }

    .tap-instruction {
      margin-top: var(--space-md);
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 500;
    }

    .tap-instruction::before {
      content: '👆';
      font-size: 1.2rem;
      animation: tapHint 1.5s infinite;
    }

    @keyframes tapHint {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* ── FLOATING POINTS ── */
    .float-point {
      position: fixed;
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      text-shadow: 0 0 30px var(--primary-glow);
      pointer-events: none;
      z-index: 9999;
      animation: floatUp 1.2s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.5) rotate(10deg); }
    }

    /* ── PROGRESS SECTION ── */
    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: var(--space-lg);
      margin-bottom: var(--space-xl);
      position: relative;
      overflow: hidden;
    }

    .progress-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-md);
    }

    .progress-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-level {
      font-size: 0.85rem;
      color: var(--secondary);
      font-weight: 700;
      font-family: var(--font-display);
    }

    .level-track {
      display: flex;
      gap: 8px;
      margin-bottom: var(--space-md);
    }

    .level-dot {
