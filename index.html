<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="color-scheme" content="dark light">
  <meta name="description" content="WOMBIT Empire - The cutest viral crypto sensation on Solana. Tap, earn, conquer!">
  <title>WOMBIT Empire | Viral Crypto Mini App</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       WOMBIT EMPIRE v4.0 - VIRAL PREMIUM EDITION
    ═══════════════════════════════════════════════════════════════════════ */

    :root {
      --primary: #ffd700;
      --primary-glow: rgba(255, 215, 0, 0.4);
      --secondary: #00d4ff;
      --secondary-glow: rgba(0, 212, 255, 0.3);
      --accent: #ff6b9d;
      --success: #00ff88;
      --bg-primary: #0a0a1a;
      --bg-secondary: #121225;
      --bg-tertiary: #1a1a35;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius-xl: 24px;
      --transition-bounce: 600ms cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Background */
    .bg-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 60%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 50% 100%, rgba(255, 215, 0, 0.08) 0%, transparent 40%);
      animation: bgPulse 15s ease-in-out infinite;
    }

    @keyframes bgPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 70%);
    }

    /* Loading Screen */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s, visibility 0.5s;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loading-logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      animation: loadingPulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 60px var(--primary-glow);
    }

    @keyframes loadingPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .loading-text {
      margin-top: 24px;
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.2em;
    }

    /* App Container */
    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: rgba(18, 18, 37, 0.8);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.2rem;
    }

    .user-details h3 {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .user-details p {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .online-dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .rank-badge {
      padding: 6px 14px;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1));
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 9999px;
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    .brand-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 10vw, 3.5rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, var(--primary) 50%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .brand-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 320px;
      margin: 0 auto 24px;
    }

    /* Stats Bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 16px 12px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 215, 0, 0.2);
      box-shadow: 0 8px 32px rgba(255, 215, 0, 0.1);
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* Tap Zone - The Main Attraction */
    .tap-zone {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .energy-bar {
      width: 100%;
      max-width: 280px;
      margin-bottom: 24px;
    }

    .energy-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.8rem;
    }

    .energy-label {
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .energy-value {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--primary);
    }

    .energy-track {
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }

    .energy-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 9999px;
      transition: width 0.3s ease;
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .wombat-container {
      position: relative;
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wombat-glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      opacity: 0.6;
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .wombat-orbit {
      position: absolute;
      inset: -40px;
      border: 2px dashed rgba(255, 215, 0, 0.15);
      border-radius: 50%;
      animation: orbit 20s linear infinite;
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .wombat-tap {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      user-select: none;
      transition: transform var(--transition-bounce);
      z-index: 10;
    }

    .wombat-tap:active {
      transform: scale(0.95);
    }

    .wombat-tap.tapped {
      animation: tapBounce 0.4s var(--transition-bounce);
    }

    @keyframes tapBounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.15) translateY(-10px); }
      100% { transform: scale(1); }
    }

    .wombat-image {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 215, 0, 0.3);
      box-shadow: 
        0 0 60px var(--primary-glow),
        0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .tap-hint {
      margin-top: 16px;
      font-size: 0.9rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tap-hint::before {
      content: '👆';
      animation: tapHint 1.5s infinite;
    }

    @keyframes tapHint {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* Floating Points */
    .float-point {
      position: fixed;
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      text-shadow: 0 0 20px var(--primary-glow);
      pointer-events: none;
      z-index: 9999;
      animation: floatUp 1s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    /* Progress Section */
    .progress-section {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-xl);
      padding: 20px;
      margin-bottom: 24px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .progress-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
    }

    .progress-level {
      font-size: 0.8rem;
      color: var(--secondary);
      font-weight: 600;
    }

    .level-track {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .level-dot {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      position: relative;
      overflow: hidden;
    }

    .level-dot.completed::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 9999px;
    }

    .level-dot.current {
      background: rgba(255, 215, 0, 0.2);
    }

    .level-dot.current::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 9999px;
      width: var(--progress, 0%);
      animation: progressShine 2s infinite;
    }

    @keyframes progressShine {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    .rewards-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .reward-item {
      flex: 1;
      text-align: center;
      padding: 12px 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .reward-item.unlocked {
      background: rgba(255, 215, 0, 0.1);
      border-color: rgba(255, 215, 0, 0.3);
    }

    .reward-item.current {
      animation: currentPulse 2s infinite;
    }

    @keyframes currentPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(255, 215, 0, 0); }
    }

    .reward-icon {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    .reward-name {
      font-size: 0.65rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    /* Action Buttons */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 20px;
      border-radius: 16px;
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #ffb800 100%);
      color: #000;
      box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--secondary) 0%, #0099cc 100%);
      color: #000;
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 212, 255, 0.5);
    }

    .btn-full {
      grid-column: 1 / -1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .btn-full:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 215, 0, 0.3);
    }

    /* Features Grid */
    .features-section {
      margin-bottom: 24px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .feature-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 16px 12px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 215, 0, 0.2);
      box-shadow: 0 8px 24px rgba(255, 215, 0, 0.1);
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(0, 212, 255, 0.2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .feature-name {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .feature-desc {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    /* Contract Address */
    .ca-section {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.05), rgba(138, 43, 226, 0.05));
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: var(--radius-xl);
      padding: 20px;
      margin-bottom: 24px;
      text-align: center;
    }

    .ca-label {
      font-size: 0.75rem;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .ca-box {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      user-select: all;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .ca-box:hover {
      border-color: var(--secondary);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
    }

    .ca-text {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--secondary);
      word-break: break-all;
    }

    .ca-hint {
      margin-top: 12px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    /* Social Section */
    .social-section {
      margin-bottom: 24px;
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
    }

    .social-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 215, 0, 0.2);
      background: rgba(255, 215, 0, 0.05);
    }

    .social-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .social-info h4 {
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .social-info p {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .footer-logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .footer-text {
      font-size: 0.75rem;
      color: var(--text-secondary);
      max-width: 300px;
